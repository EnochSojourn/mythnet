<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MythNet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.bar{position:sticky;top:0;z-index:50;background:#111827;border-bottom:1px solid #1f2937;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.bar h1{font-size:18px;font-weight:700}.bar h1 span{color:#3b82f6}
.tabs{display:flex;background:#111827;border-bottom:1px solid #1f2937;position:sticky;top:49px;z-index:40}
.tabs button{flex:1;padding:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border:none;background:none;color:#6b7280;cursor:pointer}
.tabs button.active{color:#3b82f6;border-bottom:2px solid #3b82f6}
.page{display:none;padding:12px}.page.active{display:block}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px;margin-bottom:12px}
.grade{font-size:48px;font-weight:800;text-align:center;margin:8px 0}
.good{color:#22c55e}.warn{color:#f59e0b}.bad{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:12px}
.stat .val{font-size:24px;font-weight:700}.stat .label{font-size:10px;color:#6b7280;text-transform:uppercase;margin-top:2px}
.green{color:#22c55e}.red{color:#ef4444}.blue{color:#3b82f6}.purple{color:#a78bfa}
.device{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid #1f2937}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.dot.on{background:#22c55e}.dot.off{background:#ef4444}
.device .name{font-size:14px;font-weight:500}.device .sub{font-size:11px;color:#6b7280}
.device .type{font-size:10px;padding:2px 6px;border-radius:4px;background:#1e293b;color:#94a3b8;margin-left:auto}
.ev{padding:10px 12px;border-bottom:1px solid #1f2937}
.ev .head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sev{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.sev-critical{background:#7f1d1d;color:#fca5a5}.sev-warning{background:#78350f;color:#fcd34d}.sev-info{background:#1e3a5f;color:#93c5fd}
.ev .title{font-size:13px}.ev .body{display:none;font-size:12px;color:#94a3b8;margin-top:8px;line-height:1.5;white-space:pre-wrap}
.ev.open .body{display:block}
.detail{padding:16px}.detail h2{font-size:18px;margin-bottom:12px}
.field{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.field .k{color:#6b7280}.field .v{font-family:monospace;font-size:12px}
.port{display:flex;justify-content:space-between;padding:6px 10px;background:#0f172a;border-radius:6px;margin-bottom:4px;font-size:12px}
.port .num{color:#22c55e;font-family:monospace}
.chat-box{display:flex;flex-direction:column;height:calc(100vh - 98px)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px}
.chat-msg{margin-bottom:10px;max-width:85%;font-size:13px;padding:10px 14px;border-radius:12px;line-height:1.5}
.chat-msg.user{margin-left:auto;background:#1e3a5f;border-radius:12px 12px 0 12px}
.chat-msg.ai{background:#1f2937;border-radius:12px 12px 12px 0}
.chat-input{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #1f2937;background:#111827}
.chat-input input{flex:1;background:#0f172a;border:1px solid #374151;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none}
.chat-input button{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600}
.finding{padding:4px 0;font-size:12px;display:flex;gap:6px}
.back{font-size:13px;color:#3b82f6;padding:8px 0}
.intel{margin-top:12px;background:#0c1425;border:1px solid #1e3a5f;border-radius:10px;padding:12px}
.intel .lbl{font-size:10px;color:#3b82f6;text-transform:uppercase;margin-bottom:4px}
.intel .txt{font-size:12px;line-height:1.5}
</style>
</head>
<body>
<div class="bar"><h1><span>Myth</span>Net</h1><div id="st" style="font-size:11px;color:#6b7280">...</div></div>
<div class="tabs">
<button class="active" onclick="tab('home')">Home</button>
<button onclick="tab('devices')">Devices</button>
<button onclick="tab('events')">Events</button>
<button onclick="tab('chat')">AI</button>
</div>
<div id="home" class="page active"></div>
<div id="devices" class="page"></div>
<div id="events" class="page"></div>
<div id="chat" class="page"><div class="chat-box"><div class="chat-msgs" id="cm"><div style="text-align:center;color:#6b7280;margin-top:40px"><div style="font-size:24px;margin-bottom:8px">🔍</div><div style="font-size:14px">Ask about your network</div></div></div><div class="chat-input"><input id="ci" placeholder="Ask MythNet AI..." onkeydown="if(event.key==='Enter')send()"><button onclick="send()">Send</button></div></div></div>
<div id="dd" style="display:none"></div>
<script>
var C=localStorage.getItem('mythnet_creds'),W=null;
if(!C){var p=prompt('MythNet Password:');if(p){C=btoa('admin:'+p);localStorage.setItem('mythnet_creds',C)}}
function A(u){return fetch(u,{headers:C?{'Authorization':'Basic '+C}:{}}).then(r=>{if(r.status===401){localStorage.removeItem('mythnet_creds');location.reload()}return r.json()})}
function tab(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(n).classList.add('active');document.querySelectorAll('.tabs button').forEach((b,i)=>{b.classList.toggle('active',['home','devices','events','chat'][i]===n)});document.getElementById('dd').style.display='none';if(n==='chat'&&!W)cc()}
async function lh(){var[h,s,a]=await Promise.all([fetch('/api/health').then(r=>r.json()),A('/api/stats'),A('/api/analytics').catch(()=>null)]);document.getElementById('st').textContent=h.scanning?'● Scanning':'● Online';document.getElementById('st').style.color=h.scanning?'#f59e0b':'#22c55e';var g=h.health_grade||'?',sc=h.health_score||0,gc=sc>=80?'good':sc>=60?'warn':'bad';var o='<div class="card"><div class="grade '+gc+'">'+g+'</div><div style="text-align:center;color:#6b7280;font-size:13px">Score: '+sc+'/100</div></div>';o+='<div class="stat-grid"><div class="stat"><div class="val">'+(s.total_devices||0)+'</div><div class="label">Devices</div></div><div class="stat"><div class="val green">'+(s.online_devices||0)+'</div><div class="label">Online</div></div><div class="stat"><div class="val red">'+(s.critical_events||0)+'</div><div class="label">Critical</div></div><div class="stat"><div class="val purple">'+(s.total_events||0)+'</div><div class="label">Events</div></div></div>';if(a&&a.security_posture){var sp=a.security_posture;o+='<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:8px">Findings</div>';(sp.critical_findings||[]).forEach(f=>{o+='<div class="finding"><span style="color:#ef4444">●</span>'+f+'</div>'});(sp.warnings||[]).forEach(f=>{o+='<div class="finding"><span style="color:#f59e0b">●</span>'+f+'</div>'});(sp.positives||[]).forEach(f=>{o+='<div class="finding"><span style="color:#22c55e">●</span>'+f+'</div>'});o+='</div><div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:8px">Actions</div>';(sp.recommendations||[]).forEach((r,i)=>{o+='<div class="finding"><span style="color:#3b82f6">'+(i+1)+'.</span>'+r+'</div>'});o+='</div>'}document.getElementById('home').innerHTML=o}
async function ld(){var d=await A('/api/devices');d.sort((a,b)=>a.ip.split('.').reduce((s,v,i)=>s+v*(256**(3-i)),0)-b.ip.split('.').reduce((s,v,i)=>s+v*(256**(3-i)),0));var o='';d.forEach(x=>{var n=x.hostname||x.vendor||x.ip;o+='<div class="device" onclick="ldd(\''+x.id+'\')"><div class="dot '+(x.is_online?'on':'off')+'"></div><div><div class="name">'+n+'</div><div class="sub">'+x.ip+(x.vendor&&x.vendor!==n?' · '+x.vendor:'')+'</div></div><div class="type">'+(x.device_type||'?')+'</div></div>'});document.getElementById('devices').innerHTML=o||'<div style="padding:20px;color:#6b7280;text-align:center">No devices</div>'}
async function ldd(id){var data=await A('/api/devices/'+id);var d=data.device||data;var o='<div class="detail"><div class="back" onclick="document.getElementById(\'dd\').style.display=\'none\';document.getElementById(\'devices\').style.display=\'block\'">← Back</div><h2>'+(d.hostname||d.ip)+'</h2>';[['IP',d.ip],['MAC',d.mac],['Vendor',d.vendor],['OS',d.os_guess],['Type',d.device_type],['Status',d.is_online?'🟢 Online':'🔴 Offline']].forEach(([k,v])=>{if(v)o+='<div class="field"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'});if(data.uptime)o+='<div class="field"><span class="k">Uptime 24h</span><span class="v">'+data.uptime.uptime_pct.toFixed(1)+'%</span></div>';if(data.notes)o+='<div class="intel"><div class="lbl">Intelligence</div><div class="txt">'+data.notes+'</div></div>';if(d.ports&&d.ports.length){o+='<div style="margin-top:12px;font-size:13px;font-weight:600;margin-bottom:8px">Ports ('+d.ports.length+')</div>';d.ports.forEach(p=>{o+='<div class="port"><span class="num">'+p.port+'/'+p.protocol+'</span><span>'+(p.service||'?')+'</span></div>'})}o+='</div>';document.getElementById('devices').style.display='none';document.getElementById('dd').innerHTML=o;document.getElementById('dd').style.display='block'}
async function le(){var ev=await A('/api/events?limit=30');var o='';ev.forEach(e=>{o+='<div class="ev" onclick="this.classList.toggle(\'open\')"><div class="head"><span class="sev sev-'+e.severity+'">'+e.severity+'</span><span style="font-size:10px;color:#6b7280">'+e.source+'</span><span style="font-size:10px;color:#4b5563;margin-left:auto">'+new Date(e.received_at).toLocaleTimeString()+'</span></div><div class="title">'+e.title+'</div><div class="body">'+(e.body_md||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div></div>'});document.getElementById('events').innerHTML=o||'<div style="padding:20px;color:#6b7280;text-align:center">No events</div>'}
function cc(){var pr=location.protocol==='https:'?'wss:':'ws:';W=new WebSocket(pr+'//'+location.host+'/api/chat');W.onmessage=function(e){var m=JSON.parse(e.data),ms=document.getElementById('cm');if(m.type==='chunk'){var l=ms.lastElementChild;if(!l||!l.classList.contains('ai')){l=document.createElement('div');l.className='chat-msg ai';ms.appendChild(l)}l.textContent+=m.content;ms.scrollTop=ms.scrollHeight}else if(m.type==='done'){var l=ms.querySelector('.ai:last-child');if(l)l.innerHTML=l.textContent.replace(/\n/g,'<br>')}}}
function send(){var i=document.getElementById('ci');if(!i.value.trim()||!W)return;var ms=document.getElementById('cm');var d=document.createElement('div');d.className='chat-msg user';d.textContent=i.value;ms.appendChild(d);W.send(JSON.stringify({content:i.value}));i.value='';ms.scrollTop=ms.scrollHeight}
lh();ld();le();setInterval(()=>{lh();ld();le()},15000)
</script>
</body>
</html>
