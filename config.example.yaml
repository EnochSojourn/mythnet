# MythNet Configuration

server:
  host: "0.0.0.0"
  port: 8080

scanner:
  # Subnets to scan (CIDR notation). Leave empty to auto-detect.
  subnets: []
  # How often to re-scan
  interval: "5m"
  # TCP connect timeout per host/port
  timeout: "2s"
  # Concurrent host scanning limit
  max_concurrent_hosts: 100
  # Concurrent port scanning limit per host
  max_concurrent_ports: 20
  # Ports to scan (default covers common services)
  # ports: [21, 22, 23, 25, 53, 80, 110, 111, 135, 139, 143, 443, 445, 993, 995, 1433, 1521, 3306, 3389, 5432, 5900, 6379, 8080, 8443, 9090, 27017]

telemetry:
  snmp:
    enabled: true
    # Use 162 for standard port (requires root/capabilities)
    listen: "0.0.0.0:1162"
    community: "public"
  syslog:
    enabled: true
    # Use 514 for standard port (requires root/capabilities)
    listen: "0.0.0.0:1514"
  poller:
    enabled: true
    interval: "60s"

mesh:
  enabled: false
  # "full" = complete database copy, syncs with all peers
  # "sensor" = push-only, sends data to full nodes
  node_type: "full"
  # Gossip bind address (SWIM protocol)
  bind: "0.0.0.0:7946"
  # mTLS replication server address
  replica_addr: "0.0.0.0:7947"
  # Seed nodes to join on startup
  join: []
  # Shared secret for gossip encryption (all mesh nodes must match)
  secret: ""
  # Directory for node identity (keypair + certificate)
  data_dir: "./mythnet-data"

alerts:
  # Minimum severity to trigger webhooks: "critical", "warning", "info"
  min_severity: "warning"
  webhooks: []
  # webhooks:
  #   - url: "https://hooks.slack.com/services/T.../B.../xxx"
  #   - url: "https://discord.com/api/webhooks/123/abc"
  #   - url: "https://your-server.com/webhook"

ai:
  enabled: true
  # API key (or set ANTHROPIC_API_KEY env var)
  api_key: ""
  model: "claude-sonnet-4-20250514"

database:
  path: "mythnet.db"

log:
  level: "info"
